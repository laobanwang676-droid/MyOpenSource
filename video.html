<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目演示视频</title>
  <style>
    :root {
      --bg: #f7fafc;
      --text: #1e293b;
      --muted: #64748b;
      --line: rgba(0, 0, 0, 0.08);
      --primary: #3b82f6;
      --accent: #10b981;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.10);
      --player-bg: #edf2f7;
      --back-bg: rgba(0, 0, 0, 0.04);
      --source-bg: #0f172a;
      --source-text: #fff;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --text: #f7fbff;
      --muted: #94a3b8;
      --line: rgba(148, 163, 184, 0.12);
      --primary: #3b82f6;
      --accent: #19c6a5;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --player-bg: #050813;
      --back-bg: rgba(255, 255, 255, 0.07);
      --source-bg: #fff;
      --source-text: #06111f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: background 0.3s ease, color 0.3s ease;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: var(--back-bg);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-link:hover {
      transform: translateY(-2px);
      opacity: 0.8;
    }

    .brand {
      font-weight: 800;
      color: var(--muted);
    }

    .intro {
      margin-bottom: 22px;
      text-align: center;
    }

    .intro p {
      margin: 0 0 10px;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.85rem, 4vw, 3.4rem);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .player {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--player-bg);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      min-height: 220px;
    }

    .player-icon {
      font-size: 3.4rem;
      margin-bottom: 14px;
      opacity: 0.7;
    }

    .player-title {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 700;
    }

    .player-desc {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .btn-watch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
      padding: 0 32px;
      border-radius: 8px;
      color: #fff;
      font-weight: 800;
      font-size: 1.05rem;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      box-shadow: 0 12px 28px rgba(239, 68, 68, 0.30);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-watch:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(239, 68, 68, 0.38);
    }

    .hint {
      margin: 14px 0 0;
      color: #f97316;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.7;
      text-align: center;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 8px;
      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-source {
      color: var(--source-text);
      background: var(--source-bg);
    }

    .btn-home {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 12px 26px rgba(59, 130, 246, 0.26);
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 1100px);
        padding-top: 18px;
      }

      .nav {
        align-items: flex-start;
        flex-direction: column-reverse;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav">
      <a class="back-link" href="index.html">返回首页</a>
      <div style="display:flex;align-items:center;gap:12px;">
        <a class="brand" href="index.html">喜之郎的开源网站</a>
        <button class="theme-toggle" id="themeToggle" aria-label="切换深色/浅色模式" style="background:none;border:1px solid var(--line);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:0.85rem;font-weight:500;color:var(--text-secondary);transition:all 0.2s ease;">深色</button>
      </div>
    </nav>

    <section class="intro" aria-labelledby="video-title">
      <p>项目演示视频</p>
      <h1 id="video-title">基于Free RTOS的智能天气时钟</h1>
    </section>

    <section class="player" aria-label="视频入口">
      <div class="player-icon">▶</div>
      <p class="player-title">演示视频已迁移至在线平台</p>
      <p class="player-desc">点击下方按钮前往观看</p>
      <a id="domestic-link" class="btn-watch" href="#" target="_blank" rel="noopener noreferrer">国内访问 ▶</a>
    </section>

    <p class="hint">如未使用 VPN，请点击国内播放按钮前往CSDN平台观看演示视频。</p>

    <div class="actions">
      <a id="source-link" class="btn btn-source" href="https://github.com/laobanwang676-droid/HAL_stm32F4_RTOS_clock.git" target="_blank" rel="noopener noreferrer">查看源码</a>
      <a class="btn btn-home" href="index.html">返回项目列表</a>
    </div>
  </main>

  <script>
    const projects = {
      bms: {
        title: "基于RT-Thread的多串锂电池管理系统(BMS)",
        source: "https://github.com/laobanwang676-droid/bms_rtthread.git",
        domestic: "https://live.csdn.net/v/529526"
      },
      weather: {
        title: "基于Free RTOS的智能天气时钟",
        source: "https://github.com/laobanwang676-droid/HAL_stm32F4_RTOS_clock.git",
        domestic: "https://live.csdn.net/v/527847"
      },
      balance: {
        title: "多模态两轮自平衡系统",
        source: "https://github.com/laobanwang676-droid/HAL_stm32f103c8t6_BCar.git",
        domestic: "https://live.csdn.net/v/527845"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const projectKey = params.get("project") || "weather";
    const project = projects[projectKey] || projects.weather;
    const domesticLink = document.getElementById("domestic-link");

    document.title = `${project.title} - 项目演示视频`;
    document.getElementById("video-title").textContent = project.title;
    document.getElementById("source-link").href = project.source;
    domesticLink.href = project.domestic;

    // ===== 主题切换 =====
    (function() {
      const toggle = document.getElementById('themeToggle');
      const html = document.documentElement;
      const stored = localStorage.getItem('theme');
      if (stored === 'dark') {
        html.setAttribute('data-theme', 'dark');
        if (toggle) toggle.textContent = '浅色';
      }
      if (toggle) {
        toggle.addEventListener('click', function() {
          const isDark = html.getAttribute('data-theme') === 'dark';
          if (isDark) {
            html.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            toggle.textContent = '深色';
          } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            toggle.textContent = '浅色';
          }
        });
      }
    })();
  </script>
</body>
</html>
